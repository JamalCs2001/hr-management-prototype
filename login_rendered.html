<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Management Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // Professional Indigo
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
        }
        
        /* Modern Fluid UI Foundation */
        * { box-sizing: border-box; }
        body, html { overflow-x: hidden; width: 100%; max-width: 100vw; }
        
        :root {
            --card-padding: clamp(1rem, 3vw, 2rem);
            --content-width: clamp(320px, 100%, 1280px);
        }

        /* Container sizing */
        .max-w-md, .max-w-7xl, main > div {
            width: var(--content-width) !important;
            max-width: 100% !important;
            margin-left: auto !important;
            margin-right: auto !important;
        }

        /* Fluid padding overrides for Tailwind */
        .p-8, .p-6, .p-4 {
            padding: var(--card-padding) !important;
        }

        /* Responsive Form Elements */
        input, button, select, textarea {
            width: 100%;
            max-width: 100%;
        }

        /* Table responsiveness */
        table {
            display: block;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
        }

        /* Dynamic Grid Layouts */
        .grid {
            display: grid;
            /* Auto-fit columns minimum 250px or 30vw, maximum 1fr */
            grid-template-columns: repeat(auto-fit, minmax(clamp(250px, 30vw, 300px), 1fr)) !important;
            gap: clamp(1rem, 2vw, 1.5rem);
        }

        /* Responsive Breakpoints */
        @media (max-width: 640px) {
            :root {
                --content-width: calc(100% - 2rem);
            }
            main { padding-bottom: 2rem; }
            .grid {
                grid-template-columns: 1fr !important;
            }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            /* Tablet adjustments */
            :root {
                --content-width: calc(100% - 3rem);
            }
        }
        @media (min-width: 1025px) {
            /* Desktop adjustments */
            :root {
                --content-width: min(100% - 4rem, 1280px);
            }
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200">
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    <script>
        (function() {
            const isDark = document.documentElement.classList.contains('dark');
            const overlayBg = isDark ? '#0f172a' : '#f8fafc';
            const spinnerColor = isDark ? '#334155' : '#e2e8f0';
            document.write(`
                <div id="fouc-overlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: ${overlayBg}; z-index: 999999; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s ease;">
                    <div style="width: 40px; height: 40px; border: 3px solid ${spinnerColor}; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                </div>
            `);
            
            const checkTailwind = setInterval(() => {
                const testEl = document.createElement('div');
                testEl.className = 'hidden';
                document.body.appendChild(testEl);
                const isLoaded = getComputedStyle(testEl).display === 'none';
                testEl.remove();
                
                if (isLoaded) {
                    const overlay = document.getElementById('fouc-overlay');
                    if(overlay) {
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.remove(), 300);
                    }
                    clearInterval(checkTailwind);
                }
            }, 50);
            
            setTimeout(() => { clearInterval(checkTailwind); document.getElementById('fouc-overlay')?.remove(); }, 3000);
        })();
    </script>

    
        <!-- For non-authenticated views like Login -->
        
<style>
    /* Robust RTL/LTR handling for login icons bypassing Tailwind CDN issues */
    .login-icon-start { position: absolute; top: 0; bottom: 0; display: flex; align-items: center; pointer-events: none; }
    .login-icon-end { position: absolute; top: 0; bottom: 0; display: flex; align-items: center; z-index: 10; cursor: pointer; }
    
    html[dir="ltr"] .login-icon-start { left: 0; padding-left: 0.75rem; }
    html[dir="ltr"] .login-icon-end { right: 0; padding-right: 0.75rem; }
    html[dir="ltr"] .login-input { padding-left: 2.5rem; padding-right: 0.75rem; }
    html[dir="ltr"] .login-input-pwd { padding-left: 2.5rem; padding-right: 2.75rem; }

    html[dir="rtl"] .login-icon-start { right: 0; padding-right: 0.75rem; }
    html[dir="rtl"] .login-icon-end { left: 0; padding-left: 0.75rem; }
    html[dir="rtl"] .login-input { padding-right: 2.5rem; padding-left: 0.75rem; }
    html[dir="rtl"] .login-input-pwd { padding-right: 2.5rem; padding-left: 2.75rem; }
</style>
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-slate-900 dark:to-slate-800 -z-10"></div>
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-400/20 dark:bg-blue-600/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-indigo-400/20 dark:bg-indigo-600/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md bg-white dark:bg-darkCard rounded-2xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-700 transform transition-all hover:-translate-y-1 duration-500">
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-blue-100 text-primary dark:bg-blue-900/30 mb-4">
                    <i data-lucide="layers" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white" data-lang="login_title">Welcome Back</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-2" data-lang="login_subtitle">Sign in to the HR Management Prototype</p>
            </div>

            
              
            

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" data-lang="label_email">Email Address</label>
                    <div class="relative">
                        <div class="login-icon-start">
                            <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="email" name="email" required class="block w-full py-2.5 login-input border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary transition-colors" placeholder="user@example.com">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" data-lang="label_password">Password</label>
                    <div class="relative">
                        <div class="login-icon-start">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required class="block w-full py-2.5 login-input-pwd border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary transition-colors" placeholder="••••••••">
                        <button type="button" id="togglePassword" class="login-icon-end text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 focus:outline-none">
                            <span id="eyeIconShow"><i data-lucide="eye" class="w-5 h-5"></i></span>
                            <span id="eyeIconHide" class="hidden"><i data-lucide="eye-off" class="w-5 h-5"></i></span>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-primary bg-slate-100 border-slate-300 rounded focus:ring-primary dark:bg-slate-700 dark:border-slate-600">
                        <label for="remember" class="ml-2 text-sm text-slate-600 dark:text-slate-400" data-lang="remember_me">Remember me</label>
                    </div>
                    <a href="#" class="text-sm font-medium text-primary hover:text-blue-700 dark:hover:text-blue-400 transition-colors" data-lang="forgot_pwd">Forgot password?</a>
                </div>

                <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors dark:focus:ring-offset-darkCard" data-lang="btn_login">
                    Sign in
                </button>
            </form>
            
            <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-700 flex justify-between items-center text-sm">
                <span class="text-slate-500">Language:</span>
                <button id="langToggleLogin" class="font-medium text-primary hover:underline">English / العربية</button>
            </div>
            <!-- Theme Toggle for login -->
            <div class="absolute top-4 right-4">
                 <button id="themeToggleLogin" class="p-2 rounded-full bg-white dark:bg-darkCard shadow hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 hidden dark:block text-slate-800 dark:text-white"></i>
                    <i data-lucide="sun" class="w-5 h-5 block dark:hidden text-slate-800 dark:text-white"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic specifically for login view theme toggle to sync with main.js
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeToggleLogin');
        if(btn) {
            btn.addEventListener('click', () => {
                const html = document.documentElement;
                if (html.classList.contains('dark')) {
                    html.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    html.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            });
        }

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIconShow = document.getElementById('eyeIconShow');
        const eyeIconHide = document.getElementById('eyeIconHide');
        
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'password') {
                    eyeIconShow.classList.remove('hidden');
                    eyeIconHide.classList.add('hidden');
                } else {
                    eyeIconShow.classList.add('hidden');
                    eyeIconHide.classList.remove('hidden');
                }
            });
        }
    });
</script>

    

    <script src="/static/js/main.js"></script>
    <script>
        lucide.createIcons();
        
        // Notifications Logic
        const notifBtn = document.getElementById('notifDropdownBtn');
        const notifDropdown = document.getElementById('notifDropdown');
        const markReadBtn = document.getElementById('markReadBtn');
        const notifBadge = document.getElementById('notifBadge');

        if (notifBtn) {
            notifBtn.addEventListener('click', () => {
                notifDropdown.classList.toggle('hidden');
            });

            // Close when clicking outside
            document.addEventListener('click', (e) => {
                if (!notifBtn.contains(e.target) && !notifDropdown.contains(e.target)) {
                    notifDropdown.classList.add('hidden');
                }
            });
        }

        if (markReadBtn) {
            markReadBtn.addEventListener('click', () => {
                fetch('/notifications/read', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            if (notifBadge) notifBadge.style.display = 'none';
                            markReadBtn.style.display = 'none';
                            // Optionally clear the list visually
                        }
                    });
            });
        }
    </script>
</body>
</html>
