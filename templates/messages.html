{% extends 'base.html' %}

{% block content %}
<div class="mb-6 flex justify-between items-end">
    <div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white" data-lang="messages_title">Messages</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1" data-lang="messages_subtitle">Communicate with other team members.</p>
    </div>
    <button onclick="document.getElementById('newMessageModal').classList.remove('hidden')" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center">
        <i data-lucide="edit-3" class="w-4 h-4 me-2"></i>
        <span data-lang="btn_new_message">New Message</span>
    </button>
</div>

<div class="bg-white dark:bg-darkCard rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
    <div class="p-6">
        <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-4" data-lang="inbox">Inbox</h2>
        
        <div class="space-y-4">
            {% for msg in messages %}
            <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-100 dark:border-slate-700">
                <div class="flex justify-between items-start mb-2">
                    <span class="font-semibold text-slate-900 dark:text-white">{{ msg.sender_name }}</span>
                    <span class="text-xs text-slate-500 dark:text-slate-400">{{ msg.timestamp }}</span>
                </div>
                <p class="text-sm text-slate-700 dark:text-slate-300 whitespace-pre-wrap">{{ msg.message }}</p>
            </div>
            {% else %}
            <div class="p-8 text-center text-slate-500 dark:text-slate-400">
                <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 text-slate-300 dark:text-slate-600"></i>
                <p data-lang="no_messages">No messages yet.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- New Message Modal -->
<div id="newMessageModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 transition-opacity" aria-hidden="true">
            <div class="absolute inset-0 bg-slate-900/75 dark:bg-slate-900/90 backdrop-blur-sm"></div>
        </div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div class="inline-block align-bottom bg-white dark:bg-darkCard rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full border border-slate-100 dark:border-slate-700">
            <form action="{{ url_for('messages') }}" method="POST">
                <div class="bg-white dark:bg-darkCard px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="mb-4 flex justify-between items-center">
                        <h3 class="text-lg leading-6 font-medium text-slate-900 dark:text-white" data-lang="modal_new_message">Compose Message</h3>
                        <button type="button" onclick="document.getElementById('newMessageModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-500 focus:outline-none">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" data-lang="label_to">To:</label>
                            <select name="receiver_id" required class="block w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary">
                                {% for u in users %}
                                <option value="{{ u.id }}">{{ u.name }} ({{ u.role }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" data-lang="label_message">Message:</label>
                            <textarea name="message" rows="4" required class="block w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary"></textarea>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800/50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-slate-100 dark:border-slate-700">
                    <button type="submit" class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-primary text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary sm:ml-3 sm:w-auto sm:text-sm dark:focus:ring-offset-darkCard" data-lang="btn_send">
                        Send Message
                    </button>
                    <button type="button" onclick="document.getElementById('newMessageModal').classList.add('hidden')" class="mt-3 w-full inline-flex justify-center rounded-lg border border-slate-300 dark:border-slate-600 shadow-sm px-4 py-2 bg-white dark:bg-slate-800 text-base font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm dark:focus:ring-offset-darkCard" data-lang="btn_cancel">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
